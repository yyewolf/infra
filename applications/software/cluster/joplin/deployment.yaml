apiVersion: apps/v1
kind: Deployment
metadata:
  name: joplin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: joplin
  template:
    metadata:
      labels:
        app: joplin
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - image: mirror.gcr.io/joplin/server:latest@sha256:0877bfba41a943017c42c58e90db9d8d548bfe699b5e410248b5b879371734f9
          imagePullPolicy: IfNotPresent
          name: joplin
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          envFrom:
            - secretRef:
                name: joplin-secret
          # pm2 (PM2_HOME=/opt/pm2) and yarn need writable dirs when non-root
          volumeMounts:
            - name: pm2
              mountPath: /opt/pm2
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 0m
              memory: 0Mi
            limits:
              cpu: 200m
              memory: 600Mi
      volumes:
        - name: pm2
          emptyDir: {}
        - name: tmp
          emptyDir: {}
