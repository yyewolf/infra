apiVersion: apps/v1
kind: Deployment
metadata:
  name: yt-dlp-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yt-dlp-webui
  template:
    metadata:
      labels:
        app: yt-dlp-webui
    spec:
      tolerations:
      - key: "PrivateNode"
        operator: "Equal"
        value: "home1"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: location
                operator: In
                values:
                - home1
      containers:
      - name: yt-dlp-webui
        image: ghcr.io/marcopiovanello/yt-dlp-web-ui@sha256:826e08c1f33e0b9bbf5d3a012e95f45b83b36361b4a1b331ae702db58d179bd7
        ports:
        - containerPort: 3033
