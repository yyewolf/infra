apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: oauth-proxy
spec:
  # scrutiny + torrent WebUIs (qbittorrent/joal) moved to Tailscale-only, reached via
  # the internal dashboard router (dashboard.<tailnet>.ts.net). Removed from SSO.
  # (dl stays on SSO.)
  hostnames:
  - radarr.yewolf.fr
  - sonarr.yewolf.fr
  - bazarr.yewolf.fr
  - prowlarr.yewolf.fr
  - flaresolverr.yewolf.fr
  - syncthing.yewolf.fr
  - dl.yewolf.fr
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: kgateway
    namespace: kgateway
    sectionName: https
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: ak-outpost-proxy
      port: 9000
      weight: 1
    timeouts:
      request: 0s
      backendRequest: 0s
    matches:
    - path:
        type: PathPrefix
        value: /
