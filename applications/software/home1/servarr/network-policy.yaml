apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: policy
spec:
  endpointSelector: {}
  ingress:
  - fromEndpoints:
    - {}
  - fromEndpoints:
    - matchLabels:
        io.kubernetes.pod.namespace: kgateway
  - fromEndpoints:
    - matchLabels:
        io.kubernetes.pod.namespace: authentik
  # Internal dashboard router (Tailscale-only) reaches the qbittorrent WebUI.
  - fromEndpoints:
    - matchLabels:
        io.kubernetes.pod.namespace: dashboard
  # Tailscale ingress proxy serves joal/Rustatio on its own ts hostname.
  - fromEndpoints:
    - matchLabels:
        io.kubernetes.pod.namespace: tailscale
  egress:
  - toEndpoints:
    - matchLabels:
        io.kubernetes.pod.namespace: kube-system
        k8s-app: coredns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        io.kubernetes.pod.namespace: authentik
  - toEndpoints:
    - matchLabels:
        io.kubernetes.pod.namespace: kgateway
  - toEndpoints:
    - matchLabels:
        io.kubernetes.pod.namespace: servarr
  - toCIDRSet:
    - cidr: 0.0.0.0/0
      except:
      - 10.0.0.0/8
      - 192.168.0.0/16
