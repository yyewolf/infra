apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: umami
spec:
  parentRefs:
  - name: kgateway
    namespace: kgateway
    sectionName: https
  hostnames:
  - "umami.yewolf.fr"
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: umami
      port: 3000
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
