apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayExtension
metadata:
  name: authentik-ext-auth
spec:
  type: ExtAuth
  extAuth:
    headersToForward:
    - X-Forwarded-For
    - X-Real-Ip
    - accept
    - cookie
    - authorization
    - proxy-authorization
    - x-forwarded-proto
    httpService:
      backendRef:
        name: ak-outpost-proxy
        namespace: authentik
        port: 9000
      pathPrefix: /outpost.goauthentik.io/auth/envoy
      authorizationResponse:
        headersToBackend:
        - cookie
        - x-authentik-uid
        - x-authentik-username
        - x-authentik-name
        - x-authentik-email
        - x-authentik-groups
        - x-authentik-entitlements
        headersToClient:
        - cookie
        - set-cookie
        - location
        headersToClientOnSuccess:
        - cookie
        - set-cookie
