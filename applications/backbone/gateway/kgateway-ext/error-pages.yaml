apiVersion: apps/v1
kind: Deployment
metadata:
  name: error-pages
  labels:
    app: error-pages
spec:
  replicas: 1
  selector:
    matchLabels:
      app: error-pages
  template:
    metadata:
      labels:
        app: error-pages
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: error-pages
        image: tarampampam/error-pages@sha256:f23f8042a2804669315fd232281d0ccecf1959332314a46e02ca2482064064a6
        ports:
        - containerPort: 8080
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        env:
        - name: TEMPLATE_NAME
          value: "ghost"
---
kind: Service
apiVersion: v1
metadata:
  name: errors
spec:
  type: ClusterIP
  selector:
    app: error-pages
  ports:
  - protocol: TCP
    port: 80
    targetPort: http
