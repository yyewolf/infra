apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: policy
spec:
  endpointSelector:
    matchLabels:
      app: caddy
  ingress:
  # Only the Tailscale ingress proxy may reach the router.
  - fromEndpoints:
    - matchLabels:
        io.kubernetes.pod.namespace: tailscale
  egress:
  - toEndpoints:
    - matchLabels:
        io.kubernetes.pod.namespace: kube-system
        k8s-app: coredns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
  # Reach the proxied backends. `host`/`remote-node` cover the hostNetwork
  # targets (esphome, music-assistant) whose service endpoints resolve to node IPs.
  - toEntities:
    - cluster
    - host
    - remote-node
