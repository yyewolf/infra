---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: esphome-config
  annotations:
    k8up.io/backup: "true"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path-home1-retain
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: esphome
  labels:
    app: esphome
spec:
  serviceName: esphome
  replicas: 1
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: esphome
  template:
    metadata:
      labels:
        app: esphome
    spec:
      tolerations:
        - key: PrivateNode
          operator: Equal
          value: home1
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: esphome
          image: ghcr.io/esphome/esphome:latest@sha256:959ef36e5ea97c8309429f0ba1405ddb2eead19019b81e6e9518e683dff5191c
          # Sub-path routing is handled entirely by the dashboard router: esphome's
          # dashboard emits relative asset URLs (designed for HA ingress), so Caddy
          # just strips the /esphome prefix — no app-side flag needed.
          securityContext:
            privileged: true
          env:
            - name: USERNAME
              value: "admin"
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: esphome-admin-password
                  key: password
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: esphome-config
---
apiVersion: v1
kind: Service
metadata:
  name: esphome
spec:
  selector:
    app: esphome
  ports:
    - protocol: TCP
      port: 6052
      targetPort: 6052
  type: ClusterIP
# esphome is now Tailscale-only, reached via the internal dashboard router
# (dashboard.<tailnet>.ts.net/esphome). Public HTTPRoute removed.
