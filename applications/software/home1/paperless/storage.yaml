apiVersion: v1
kind: PersistentVolume
metadata:
  name: paperless-storage
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: paperless-hostpath
  hostPath:
    path: /tank/paperless/data
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: location
              operator: In
              values:
                - home1
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-storage
  annotations:
    k8up.io/backup: "true"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: paperless-hostpath
  resources:
    requests:
      storage: 50Gi
