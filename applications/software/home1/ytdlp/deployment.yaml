apiVersion: apps/v1
kind: Deployment
metadata:
  name: yt-dlp-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yt-dlp-webui
  template:
    metadata:
      labels:
        app: yt-dlp-webui
    spec:
      tolerations:
      - key: "PrivateNode"
        operator: "Equal"
        value: "home1"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: location
                operator: In
                values:
                - home1
      containers:
      - name: yt-dlp-webui
        image: ghcr.io/marcopiovanello/yt-dlp-web-ui@sha256:2098e91d0282b3c49955aa4db72898a4ccb229feeaddf5ab35290970d7169dc0
        ports:
        - containerPort: 3033
