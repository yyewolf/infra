apiVersion: apps/v1
kind: Deployment
metadata:
  name: joplin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: joplin
  template:
    metadata:
      labels:
        app: joplin
    spec:
      automountServiceAccountToken: false
      containers:
        - image: mirror.gcr.io/joplin/server:latest@sha256:0877bfba41a943017c42c58e90db9d8d548bfe699b5e410248b5b879371734f9
          imagePullPolicy: IfNotPresent
          name: joplin
          envFrom:
            - secretRef:
                name: joplin-secret
          resources:
            requests:
              cpu: 0m
              memory: 0Mi
            limits:
              cpu: 200m
              memory: 600Mi
