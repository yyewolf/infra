apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radar
  namespace: radar
spec:
  interval: 5m
  chart:
    spec:
      chart: radar
      version: 1.8.3
      sourceRef:
        kind: HelmRepository
        name: skyhook
        namespace: radar
  values:
    # Access is gated by Tailscale (private tailnet) in front of the service,
    # so Radar itself runs unauthenticated.
    auth:
      mode: none
    rbac:
      helm: true
      podExec: true
      portForward: true
      crdGroups:
        all: true
    # Exposed through a standalone tailscale Ingress (see ingress.yaml), not the
    # chart's built-in ingress.
    ingress:
      enabled: false
    service:
      type: ClusterIP
      port: 9280
