apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jellyswarrm
spec:
  parentRefs:
  - name: kgateway
    namespace: kgateway
    sectionName: https
  hostnames:
  - "flix.hackcorp.net"
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: jellyswarrm
      port: 80
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
